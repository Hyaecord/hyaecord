<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' data: https:; media-src https:; script-src 'self'" />
  <title>Hyaecord</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-theme="dark">
  <div id="app" class="shell" role="application" aria-label="Hyaecord">
    <nav id="server-rail" class="server-rail" role="navigation" aria-label="Servers">
      <div id="server-pills" class="server-pills" tabindex="0"></div>
    </nav>
    <nav id="channel-list" class="channel-list" role="navigation" aria-label="Channels" tabindex="0">
      <header id="server-header" class="server-header"></header>
      <ul id="channels" role="list"></ul>
      <div id="voice-bar" class="voice-bar" hidden></div>
    </nav>
    <main class="chat" role="main">
      <header id="chat-header" class="chat-header"></header>
      <button id="message-search-button" type="button" class="message-search-button" aria-label="Search messages">🔍</button>
      <button id="pins-button" type="button" class="pins-button" aria-label="Pinned messages">📌</button>
      <section id="messages" class="messages" role="log" aria-live="polite" aria-label="Messages"></section>
      <div id="typing-indicator" class="typing-indicator" aria-live="polite"></div>
      <footer class="composer">
        <input id="composer-input" type="text" aria-label="Message input" />
        <button id="silent-toggle-button" type="button" class="silent-toggle-button" aria-label="Send silently" aria-pressed="false">🔕</button>
        <button id="emoji-picker-button" type="button" class="emoji-picker-button" aria-label="Emoji picker">🙂</button>
        <button id="gif-picker-button" type="button" class="gif-picker-button" aria-label="GIF picker">GIF</button>
        <button id="sticker-picker-button" type="button" class="sticker-picker-button" aria-label="Sticker picker">🏷️</button>
      </footer>
    </main>
    <aside id="member-list" class="member-list" role="complementary" aria-label="Members" tabindex="0"></aside>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
